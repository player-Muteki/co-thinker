# Co-Thinker Project Configuration
[project]
model = "deepseek-chat"
base_url = "https://api.deepseek.com"
chunk_size = 800
chunk_overlap = 120
top_k = 5
retrieval_candidate_k = 20
similarity_cutoff = 0.25
rrf_k = 60
vector_weight = 0.55
bm25_weight = 0.45
max_tokens = 2048
temperature = 0.2
context_token_budget = 6000
max_history_turns = 10
log_level = "INFO"
parser_engine = "auto"
max_file_size_mb = 20
